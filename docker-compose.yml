services:
  pokeops-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: pokeops-api:latest
    container_name: pokeops-api
    ports:
      - "5000:5000"
    environment:
      APP_ENV: dev
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
